<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SymptomCheck | AI Diagnosis Helper</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --accent: #4895ef;
            --light: #f8f9fa;
            --dark: #212529;
            --success: #4cc9f0;
            --danger: #f72585;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem;
            color: var(--dark);
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        header {
            background: var(--primary);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        
        h1 {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-weight: 300;
            opacity: 0.9;
        }
        
        .form-container {
            padding: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--secondary);
        }
        
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            background-color: white;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1em;
        }
        
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }
        
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .symptom-counter {
            text-align: right;
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: -1rem;
            margin-bottom: 1.5rem;
        }
        
        footer {
            text-align: center;
            padding: 1rem;
            color: #6c757d;
            font-size: 0.9rem;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MEDICURE</h1>
            <p class="subtitle">AI-powered symptom analysis for better health insights</p>
        </header>
        
        <div class="form-container">
            <form method="post" action="/predict">
                <p class="symptom-counter">Select 1-5 symptoms</p>
                
                <div class="form-group">
                    <label for="symptom1">Primary Symptom*</label>
                    <select name="symptom1" id="symptom1" required>
                        <option value="">-- Select your most noticeable symptom --</option>
                        {% for symptom in symptom_choices %}
                        <option value="{{ symptom }}">{{ symptom }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="symptom2">Additional Symptom</label>
                    <select name="symptom2" id="symptom2">
                        <option value="">-- Optional --</option>
                        {% for symptom in symptom_choices %}
                        <option value="{{ symptom }}">{{ symptom }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="symptom3">Additional Symptom</label>
                    <select name="symptom3" id="symptom3">
                        <option value="">-- Optional --</option>
                        {% for symptom in symptom_choices %}
                        <option value="{{ symptom }}">{{ symptom }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="symptom4">Additional Symptom</label>
                    <select name="symptom4" id="symptom4">
                        <option value="">-- Optional --</option>
                        {% for symptom in symptom_choices %}
                        <option value="{{ symptom }}">{{ symptom }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="symptom5">Additional Symptom</label>
                    <select name="symptom5" id="symptom5">
                        <option value="">-- Optional --</option>
                        {% for symptom in symptom_choices %}
                        <option value="{{ symptom }}">{{ symptom }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <button type="submit" class="btn">
                    <span>Analyze Symptoms</span>
                </button>
            </form>
        </div>
        
        <footer>
            <p>This tool provides health information, not medical advice. Consult a doctor for diagnosis.</p>
        </footer>
    </div>
</body>
</html>
